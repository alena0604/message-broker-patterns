repos:
  - repo: local
    hooks:
      - id: format-check
        name: format check
        language: system
        entry: make format-check
        pass_filenames: false
      - id: lint-check
        name: lint check
        language: system
        entry: make lint-check
        pass_filenames: false
      - id: unit-tests
        name: unit tests
        language: system
        entry: make unit-tests
        pass_filenames: false
        stages: [pre-push]
